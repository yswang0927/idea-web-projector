<!DOCTYPE html>
<html>
<head>
  <title>正在连接IDE...</title>
  <meta charset="UTF-8">
  <meta content="JetBrains Projector" name="apple-mobile-web-app-title"/>
  <meta content="yes" name="apple-mobile-web-app-capable"/>
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
  <link href="pj.svg" rel="shortcut icon" type="image/x-icon">
  <link href="styles.css" rel="stylesheet" type="text/css">
  <link href="manifest.webmanifest" rel="manifest">
  <link href="apple-touch-icon.png" rel="apple-touch-icon" sizes="192x192" >
  <script src="pako-2.1.0.min.js"></script>
  <script>
    // yswang add: 修正 enableCompression 参数以使用 gzip
    // 主要原因是 Java 压缩代码是 int8，但 pako.inflate 需要 uint8。
    // see https://github.com/JetBrains/projector-client/pull/152/changes
    // 用在 GZipToClientMessageDecompressor#L43(private val pako: dynamic = js("window.pakoDepress"))
    window.pakoDepress = (data) => {
      const decompressedData = pako.inflate(new Uint8Array(data.buffer))
      return new Int8Array(decompressedData.buffer)
    };

    // Disable caching for some scripts (described here: https://stackoverflow.com/questions/118884/how-to-force-the-browser-to-reload-cached-css-js-files):
    const timestamp = Math.floor(Date.now());
    const notCachableScripts = [
      "projector-client-web.js",
    ];

    notCachableScripts.forEach((script) => document.write(
        '<script src="' +
        script +
        '?v=' +
        timestamp +
        '" type="text/javascript"><\/script>'
    ));

    function onLoad() {
      if (window['projector-client-web']) {
        window['projector-client-web'].org.jetbrains.projector.client.web.onLoad();
      }
      else {
        alert("Can't find window['projector-client-web']... Maybe the deployment is broken and there is no JS.");
      }
    }

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker
          .register('/projector-client/serviceworker.js')
          .then(
              function () {
                console.log('Service Worker registered');
              },
              function (e) {
                console.log('Service Worker registration failed', e);
              },
          );
    }
  </script>

  <script>
    // iframe 内部接收
    const params = new URLSearchParams(window.location.search);
    let paramProjectPath = params.get('projectPath') || '';
    let paramFilePath = params.get('filePath') || '';
    let paramLineNo = params.get('lineNumber') || 0;
    let paramTheme = params.get('theme') || '';

    let isMainWindowReady = false;
    // 当主窗口准备好后, 自动处理需要打开的指令操作
    window.addEventListener('projectorWindowReady', function() {
      if (!isMainWindowReady) {
        isMainWindowReady = true;
        if (paramProjectPath) {
          setTimeout(function(){
            window.projectorOpenProject(paramProjectPath);
          }, 300);
        }

        if (paramFilePath) {
          setTimeout(function(){
            window.projectorOpenFile(paramFilePath, paramLineNo);
          }, 300);
        }

        if (paramTheme) {
          setTimeout(function(){
            window.projectorChangeTheme(paramTheme);
          }, 300);
        }

        // 手工触发下窗口resize事件,让IDEA自动适应浏览器窗口大小
        setTimeout(function(){
          window.dispatchEvent(new Event('resize'));
        }, 1500);
      }
    });

    window.addEventListener('message', (event) => {
      // {'action':'openProject', 'value': '/path'}
      // {'action':'openFile', 'value': '/path/file'}
      const msg = event.data;
      if (typeof msg !== 'object' || msg === null) return;
      const action = msg.action || 'unknown';
      const value = msg.value || '';

      if (!isMainWindowReady) {
        console.warn(">> 主窗口未准备好, 不能立刻处理事件: ", msg);
      }

      switch (action) {
        // 打开项目
        case 'openProject':
          if (value && typeof value === 'string') {
            paramProjectPath = value;
            isMainWindowReady && window.projectorOpenProject(value);
          }
          break;
        // 打开文件,支持行号: /A.java#L10
        case 'openFile':
          if (value && typeof value === 'string') {
            let filePath = value;
            let lineNo = 0;
            const lineIndex = value.indexOf('#L');
            if (lineIndex != -1) {
              filePath = value.substring(0, lineIndex);
              lineNo = parseInt(value.substring(lineIndex + 2)) || 0;
            }
            if (filePath) {
              // 相对路径, 需要拼接上项目路径
              if (filePath.charAt(0) != '/') {
                if (!paramProjectPath) {
                  console.warn('>> 无项目路径, 无法打开相对路径文件: '+ filePath);
                  return;
                }
                filePath = paramProjectPath + (paramProjectPath.charAt(paramProjectPath.length - 1) != '/' ? '/' : '') + filePath;
              }
              paramFilePath = filePath;
              paramLineNo = Math.max(0, lineNo);
              isMainWindowReady && window.projectorOpenFile(filePath, Math.max(0, lineNo));
            }
          }
          break;
        // 切换主题
        case 'theme':
          if (value && typeof value === 'string') {
            paramTheme = value;
            isMainWindowReady && window.projectorChangeTheme(value);
          }
          break;
        default:
          console.error('>> 无效的命令: ', msg);
      }
    });
  </script>
</head>

<body onload="onLoad()">
</body>
</html>
